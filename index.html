<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>开发笔记 · DevNotes</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <div class="layout">
      <button class="sidebar-toggle" @click="sidebarOpen = true" v-show="!sidebarOpen" aria-label="打开侧边栏">☰</button>
      <div class="sidebar-backdrop" @click="sidebarOpen = false" v-show="sidebarOpen"></div>

      <nav class="sidebar" :class="{ open: sidebarOpen }" aria-label="主导航">
        <div class="sidebar-brand">
          <button class="sidebar-close" @click="sidebarOpen = false" aria-label="关闭侧边栏">✕</button>
          <p class="sidebar-eyebrow">Dev Notes</p>
          <h1 class="sidebar-title">开发笔记</h1>
        </div>
        <div class="sidebar-nav">
          <button
            v-for="tab in tabs"
            :key="tab.id"
            class="sidebar-item"
            :class="{ active: activeTab === tab.id }"
            @click="switchTab(tab.id)"
          >
            <span class="sidebar-icon">{{ tab.icon }}</span>
            <span>{{ tab.title }}</span>
          </button>
        </div>
      </nav>

      <div class="main-area">
        <main class="app-shell">
          <note-center v-show="activeTab === 'notes'"></note-center>
          <pricing-matrix v-show="activeTab === 'pricing'"></pricing-matrix>
        </main>
      </div>
    </div>
  </div>

  <script src="js/data-notes.js"></script>
  <script src="js/data-pricing.js"></script>
  <script src="js/vendor/vue.global.prod.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
